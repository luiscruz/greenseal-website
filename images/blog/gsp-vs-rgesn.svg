<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <clipPath id="clipLeft">
      <circle cx="415" cy="310" r="245"/>
    </clipPath>
    <clipPath id="clipRight">
      <circle cx="785" cy="310" r="245"/>
    </clipPath>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="12" flood-color="#1a3a2a18"/>
    </filter>
    <filter id="tagShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Left circle -->
  <circle cx="415" cy="310" r="245" fill="#eef6f1" filter="url(#softShadow)"/>
  <!-- Right circle -->
  <circle cx="785" cy="310" r="245" fill="#eef6f1" filter="url(#softShadow)"/>
  <!-- Overlap fill -->
  <g clip-path="url(#clipLeft)">
    <circle cx="785" cy="310" r="245" fill="#cce5d8"/>
  </g>
  <!-- Circle strokes -->
  <circle cx="415" cy="310" r="245" fill="none" stroke="#52b788" stroke-width="1.5" opacity="0.5"/>
  <circle cx="785" cy="310" r="245" fill="none" stroke="#52b788" stroke-width="1.5" opacity="0.5"/>

  <!-- RGESN title -->
  <text x="295" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#1a3a2a" letter-spacing="3" font-weight="bold">RGESN</text>
  <text x="295" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#52b788" letter-spacing="1.5" font-style="italic">product-level compliance</text>
  <line x1="190" y1="204" x2="400" y2="204" stroke="#52b788" stroke-width="0.75" opacity="0.4"/>

  <!-- RGESN items -->
  <text x="295" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Digital service checklist</text>
  <text x="295" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">148 specific criteria</text>
  <text x="295" y="276" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">French regulatory anchor</text>
  <text x="295" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Ecoconception declaration</text>
  <text x="295" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Public sector reference</text>
  <text x="295" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Point-in-time assessment</text>
  <text x="295" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Web and app surface focus</text>
  <line x1="190" y1="386" x2="400" y2="386" stroke="#52b788" stroke-width="0.75" opacity="0.4"/>

  <!-- RGESN ceiling tag: dark pill -->
  <rect x="172" y="396" width="246" height="30" rx="15" fill="#1a3a2a" filter="url(#tagShadow)"/>
  <text x="295" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#ffffff" font-style="italic" letter-spacing="0.5">compliance has a ceiling</text>

  <!-- GSP title -->
  <text x="905" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#1a3a2a" letter-spacing="3" font-weight="bold">GSP</text>
  <text x="905" y="192" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#52b788" letter-spacing="1.5" font-style="italic">organisation-level maturity</text>
  <line x1="800" y1="204" x2="1010" y2="204" stroke="#52b788" stroke-width="0.75" opacity="0.4"/>

  <!-- GSP items -->
  <text x="905" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Engineering org certification</text>
  <text x="905" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">5 capability pillars</text>
  <text x="905" y="276" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Stack and geography agnostic</text>
  <text x="905" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Measurement and KPIs</text>
  <text x="905" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Governance and culture</text>
  <text x="905" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Continuous improvement loops</text>
  <text x="905" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12.5" fill="#2d5a3d">Surfaces unanticipated gains</text>
  <line x1="800" y1="386" x2="1010" y2="386" stroke="#52b788" stroke-width="0.75" opacity="0.4"/>

  <!-- GSP ceiling tag: green pill -->
  <rect x="779" y="396" width="252" height="30" rx="15" fill="#52b788" filter="url(#tagShadow)"/>
  <text x="905" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#ffffff" font-style="italic" letter-spacing="0.5">improvement has no ceiling</text>

  <!-- Overlap zone -->
  <text x="600" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#1a3a2a" letter-spacing="2.5" font-weight="bold">SHARED INTENT</text>
  <line x1="544" y1="242" x2="656" y2="242" stroke="#52b788" stroke-width="0.75" opacity="0.6"/>
  <text x="600" y="267" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a3a2a">Reduce software&#8217;s</text>
  <text x="600" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a3a2a">environmental impact</text>
  <line x1="550" y1="298" x2="650" y2="298" stroke="#52b788" stroke-width="0.5" opacity="0.4"/>
  <text x="600" y="317" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a3a2a">Ecodesign practices</text>
  <text x="600" y="336" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a3a2a">Architecture awareness</text>
  <text x="600" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a3a2a">Strategy and governance</text>

  <!-- Bottom caption -->
  <text x="600" y="558" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#999999" font-style="italic">RGESN tells you what a sustainable service looks like at delivery.</text>
  <text x="600" y="579" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#999999" font-style="italic">GSP builds the engineering capability to deliver that, consistently.</text>

  <!-- Credit -->
  <text x="1150" y="614" text-anchor="end" font-family="Georgia, serif" font-size="10" fill="#cccccc" letter-spacing="1">GreenSeal.dev</text>
</svg>
